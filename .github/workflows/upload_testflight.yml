name: Upload to TestFlight

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Codemagic IPA download URL'
        required: true

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - name: Download IPA
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o my_budget_plan.ipa

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: my_budget_plan.ipa
          issuer-id: dbb08011-93cf-4501-89b0-cd49b04be3fb
          api-key-id: 9434Y4VH6U
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
