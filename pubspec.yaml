name: my_budget_plan
description: 人生プロジェクト管理アプリ
publish_to: 'none'
version: 1.0.0+26

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ローカルDB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 状態管理
  flutter_riverpod: ^2.5.1

  # ナビゲーション
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0

  # ユーティリティ
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.3

  # Firebase
  firebase_core: ^3.0.0

  # 通知
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/characters/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#1A2B5E"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
